name: Deploy To Server

on:
  push:
    branches:
      - master

concurrency:
  group: wizardcloud-deployment
  cancel-in-progress: false

env:
  IMAGE_NAME: nuxt-admin
  SERVICE_NAME: nuxt_admin

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get Latest Code
        uses: actions/checkout@v4

      - name: 🔧 Add Environment Variables
        run: |
          echo "NUXT_PUBLIC_API_URL=https://${{ secrets.WIZARD_CLOUD_API_DOMAIN }}" >> .env
          echo "NUXT_PUBLIC_WS_URL=wss://${{ secrets.WIZARD_CLOUD_API_DOMAIN }}/graphql" >> .env

      - name: 🛠️ Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login To Server Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.SERVER_REGISTRY }}
          username: ${{ secrets.SERVER_REGISTRY_USERNAME }}
          password: ${{ secrets.SERVER_REGISTRY_PASSWORD }}

      - name: 🏗️ Build And Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.Prod
          push: true
          tags: ${{ secrets.SERVER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Deploy To Server
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            cd "${{ secrets.DOCKER_COMPOSER_DIRECTORY }}"

            echo "Pull latest images..."
            docker compose pull ${{ env.SERVICE_NAME }}

            echo "Recreating ${{ env.SERVICE_NAME }}..."
            docker compose up -d --no-deps ${{ env.SERVICE_NAME }}

            echo "Prune images..."
            docker image prune -f
